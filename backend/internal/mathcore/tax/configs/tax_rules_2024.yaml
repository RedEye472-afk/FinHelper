# Версионные правила расчёта налогов для ФинПомощник.
# Каждое изменение в законодательстве → новая версия файла, старые НЕ удаляются.
# Эталоны сверені с ФНС РФ (НК РФ Гл. 23, Гл. 26.2) и Указаниями ЦБ о ключевой ставке.

# Источники ключевой ставки ЦБ на 1 января:
#   2024: отставка 7.5% действовала до 15.07.2023, далее повышалась; на 01.01.2024 = 16%
#   2025: на 01.01.2025 = 21% (повышение 26.07.2024)
#   2026: на 01.01.2026 = 21% (ставка удерживалась с 2024)
# Замечание: фактические значения проверять на cbr.ru при релизе; эти цифры —
# основа для golden-тестов, изменение требует обновления эталонов.

year: 2024
method: jan1_rate          # ФЗ-382 от 26.12.2023 (действует с доходов 2024+)
key_rate_jan1: "0.16"
non_taxable_threshold: "1000000"   # 1 млн × key_rate_jan1 (вычисляется в коде)
deposit_tax_rate: "0.13"            # НДФЛ 13%

# Предыдущая методика (для обратной совместимости, не используется в MVP).
# method: max_rate — действовала для доходов 2021-2023.

sources:
  deposit: "НК РФ ст. 214.2, ФЗ-382 от 26.12.2023"
  key_rate: "ЦБ РФ: действующая ключевая ставка на 01.01.2024"
  ndfl: "НК РФ Гл. 23"

# НПД (ФЗ-422)
npd:
  rate_individuals: "0.04"        # 4% при работе с физлицами
  rate_business: "0.06"           # 6% при работе с ИП/юрлицами
  annual_limit: "2400000"         # лимит дохода для НПД
  source: "ФЗ-422 от 27.11.2018"

# УСН (НК РФ Гл. 26.2)
usn:
  rate_income: "0.06"             # УСН «Доходы»
  rate_income_minus_expenses: "0.15"  # УСН «Доходы минус расходы»
  source: "НК РФ Гл. 26.2"

# НДФЛ (НК РФ Гл. 23)
ndfl:
  base_rate: "0.13"               # для доходов до 5 млн/год
  high_rate: "0.15"               # для части дохода свыше 5 млн/год (с 2021)
  high_income_threshold: "5000000"
  child_deduction_1: "1400"       # вычет на 1-го/2-го ребёнка
  child_deduction_3: "3000"       # вычет на 3-го и последующих
  property_deduction_max: "260000"  # имущественный вычет (13% × 2 млн)
  iis_deduction_max: "52000"      # ИИС тип А (13% × 400 тыс.)
  source: "НК РФ ст. 210, 218, 220, 219.1"
